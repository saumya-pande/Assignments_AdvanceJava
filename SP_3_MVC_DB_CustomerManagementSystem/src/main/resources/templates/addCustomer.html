<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Customer</title>
    <meta charset="UTF-8">
</head>
<body>

<h2>Add Customer</h2>

<form th:action="@{/saveCustomer}" method="post" th:object="${customer}">

    <label>Name:</label><br>
    <input type="text" th:field="*{customerName}" required>
    <br><br>

    <label>Email:</label><br>
    <input type="email" th:field="*{email}" required>
    <br><br>

    <label>Phone Number:</label><br>
    <input type="number" th:field="*{phoneNumber}" required>
    <br><br>

    <label>Residential Address:</label><br>
    <input type="text" th:field="*{residentialAddress}" required>
    <br><br>

    <button type="submit">Save</button>

</form>

<br>
<a th:href="@{/customers}">Back to List</a>

</body>
</html>
